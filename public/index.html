<!DOCTYPE html>
<html lang="ja" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Discord Ultimate Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @font-face { font-family: 'Discord'; src: url('https://fonts.cdnfonts.com/css/whitney-2'); }
        body { font-family: 'gg sans', 'Whitney', sans-serif; }
        .mention { background: rgba(88, 101, 242, 0.3); border-left: 2px solid #5865f2; padding-left: 4px; border-radius: 2px; color: #fff; }
        .message-hover:hover { background-color: #2e3035; }
    </style>
</head>
<body class="bg-[#313338] text-[#dbdee1] h-full flex overflow-hidden">

    <nav class="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 space-y-2 shrink-0">
        <div class="w-12 h-12 bg-[#5865f2] rounded-[16px] flex items-center justify-center text-white cursor-pointer"><i class="fa-brands fa-discord text-2xl"></i></div>
        <div class="w-8 h-[2px] bg-[#35363c] rounded-full my-1"></div>
        <div class="w-12 h-12 bg-[#313338] rounded-[24px] flex items-center justify-center cursor-pointer hover:bg-[#23a55a] hover:rounded-[16px] transition-all text-[#23a55a] hover:text-white"><i class="fa-solid fa-plus text-xl"></i></div>
    </nav>

    <aside class="w-60 bg-[#2b2d31] flex flex-col shrink-0">
        <div class="h-12 px-4 flex items-center shadow-md border-b border-[#1e1f22] font-bold text-white">Node.js Master</div>
        <div class="flex-1 overflow-y-auto pt-4 px-2 space-y-4">
            <div>
                <div class="text-xs font-bold text-[#949ba4] uppercase px-2 mb-1 flex items-center justify-between">
                    <span>TEXT CHANNELS</span><i class="fa-solid fa-plus text-[10px]"></i>
                </div>
                <div class="space-y-0.5">
                    <div class="bg-[#3f4147] text-white px-2 py-1.5 rounded flex items-center cursor-pointer"><i class="fa-solid fa-hashtag mr-2 text-[#80848e]"></i> general</div>
                    <div class="hover:bg-[#35373c] px-2 py-1.5 rounded flex items-center cursor-pointer text-[#80848e] hover:text-[#dbdee1] transition"><i class="fa-solid fa-hashtag mr-2"></i> dev-logs</div>
                </div>
            </div>
        </div>
        <div class="bg-[#232428] h-[52px] px-2 flex items-center space-x-2">
            <img id="my-avatar" class="w-8 h-8 rounded-full" src="">
            <div class="flex-1 min-w-0"><div id="my-name" class="text-xs font-bold text-white truncate"></div><div class="text-[10px] text-[#b5bac1]">Online</div></div>
            <div class="flex text-[#b5bac1]"><i class="fa-solid fa-microphone p-2 hover:bg-[#3f4147] rounded cursor-pointer"></i><i class="fa-solid fa-gear p-2 hover:bg-[#3f4147] rounded cursor-pointer"></i></div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-12 px-4 shadow-md flex items-center border-b border-[#1e1f22] bg-[#313338] z-10">
            <i class="fa-solid fa-hashtag mr-2 text-[#80848e] text-xl"></i>
            <span class="font-bold text-white">general</span>
        </header>
        <div id="messages" class="flex-1 overflow-y-auto px-4 space-y-1 py-4 custom-scrollbar"></div>
        <div class="px-4 pb-6">
            <div class="bg-[#383a40] rounded-lg flex items-center p-2.5">
                <i class="fa-solid fa-circle-plus text-[#b5bac1] hover:text-white cursor-pointer mr-4 px-1"></i>
                <input id="input" autocomplete="off" class="bg-transparent flex-1 outline-none text-[#dbdee1] placeholder-[#87898c]" placeholder="#general へのメッセージ">
                <div class="flex space-x-3 text-[#b5bac1] ml-4">
                    <i class="fa-solid fa-gift hover:text-white cursor-pointer"></i>
                    <i class="fa-solid fa-face-smile hover:text-white cursor-pointer"></i>
                </div>
            </div>
        </div>
    </main>

    <aside class="w-60 bg-[#2b2d31] shrink-0 p-3 hidden lg:block overflow-y-auto">
        <div id="member-header" class="text-xs font-bold text-[#949ba4] uppercase mb-2 px-2"></div>
        <div id="user-list" class="space-y-1"></div>
    </aside>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let nickname = localStorage.getItem('chat_name') || prompt("Username?");
        localStorage.setItem('chat_name', nickname);

        document.getElementById('my-name').textContent = nickname;
        document.getElementById('my-avatar').src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${nickname}`;

        socket.emit('join', nickname);

        const messagesArea = document.getElementById('messages');
        const input = document.getElementById('input');

        // メッセージ表示関数
        function renderMessage(data) {
            const isMention = data.text.includes(`@${nickname}`);
            const div = document.createElement('div');
            div.className = `flex py-1 px-4 message-hover -mx-4 group ${isMention ? 'mention' : ''}`;
            div.innerHTML = `
                <img src="${data.avatar}" class="w-10 h-10 rounded-full mr-4 mt-1">
                <div class="flex-1">
                    <div class="flex items-baseline space-x-2">
                        <span class="font-bold text-white hover:underline cursor-pointer">${data.nickname}</span>
                        <span class="text-[10px] text-[#949ba4] font-medium">${data.time}</span>
                    </div>
                    <div class="text-[#dbdee1] text-[15px] leading-relaxed break-words">${data.text}</div>
                </div>
                <div class="hidden group-hover:flex absolute right-8 bg-[#2b2d31] border border-[#1e1f22] rounded shadow-xl p-1 space-x-1 -mt-4">
                    <button class="p-1 hover:bg-[#3f4147] rounded text-sm">👍</button>
                    <button class="p-1 hover:bg-[#3f4147] rounded text-sm">🔥</button>
                    <button class="p-1 hover:bg-[#3f4147] rounded text-sm"><i class="fa-solid fa-ellipsis"></i></button>
                </div>
            `;
            messagesArea.appendChild(div);
            messagesArea.scrollTo(0, messagesArea.scrollHeight);
        }

        document.getElementById('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

        socket.on('chat message', (data) => renderMessage(data));

        socket.on('user list', (users) => {
            const list = document.getElementById('user-list');
            document.getElementById('member-header').textContent = `Online — ${users.length}`;
            list.innerHTML = users.map(u => `
                <div class="flex items-center px-2 py-1.5 rounded hover:bg-[#35373c] cursor-pointer group">
                    <div class="relative mr-3 shrink-0">
                        <img src="${u.avatar}" class="w-8 h-8 rounded-full">
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-[#23a55a] rounded-full border-[3px] border-[#2b2d31]"></div>
                    </div>
                    <span class="text-[#949ba4] group-hover:text-white font-medium truncate">${u.nickname}</span>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
